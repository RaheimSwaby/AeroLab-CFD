<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AeroLab CFD</title>
    <link rel="stylesheet" href="/assets/style.css?v=18" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>AeroLab CFD</h1>
          <p id="rootPath"></p>
        </div>
        <div class="status-strip">
          <span class="status-dot"></span>
          <span>Local</span>
        </div>
      </header>

      <main class="workspace">
        <aside class="sidebar">
          <section class="panel">
            <h2>Model</h2>
            <label class="file-drop">
              <input id="modelFile" type="file" accept=".stl" />
              <span id="fileLabel">Select STL</span>
            </label>
            <button id="sampleButton" type="button">Load Sample</button>
            <button id="prepareScanButton" type="button" disabled>Prepare Scan</button>
            <p id="repairStatus" class="inline-status"></p>
            <label>
              <span>STL units</span>
              <select id="unitScale">
                <option value="1" data-label="m">Meters</option>
                <option value="0.001" data-label="mm">Millimeters</option>
                <option value="0.01" data-label="cm">Centimeters</option>
                <option value="0.0254" data-label="in">Inches</option>
              </select>
            </label>
            <label>
              <span>Measured length m</span>
              <input id="targetLength" type="number" min="0" step="0.001" placeholder="Tape or CAD value" />
            </label>
            <label>
              <span>Measured width m</span>
              <input id="targetWidth" type="number" min="0" step="0.001" placeholder="Tape or CAD value" />
            </label>
            <label>
              <span>Measured height m</span>
              <input id="targetHeight" type="number" min="0" step="0.001" placeholder="Tape or CAD value" />
            </label>
            <label>
              <span>Source flow</span>
              <select id="sourceFlowDirection">
                <option value="+x" selected>+X</option>
                <option value="-x">-X</option>
                <option value="+y">+Y</option>
                <option value="-y">-Y</option>
                <option value="+z">+Z</option>
                <option value="-z">-Z</option>
              </select>
            </label>
            <label>
              <span>Source up</span>
              <select id="sourceUpDirection">
                <option value="+z" selected>+Z</option>
                <option value="-z">-Z</option>
                <option value="+y">+Y</option>
                <option value="-y">-Y</option>
                <option value="+x">+X</option>
                <option value="-x">-X</option>
              </select>
            </label>
            <div class="alignment-controls">
              <div class="alignment-header">
                <span>Model rotation</span>
                <div class="alignment-actions">
                  <button id="autoAlignButton" class="compact-button" type="button">Auto-align</button>
                  <button id="resetRotationButton" class="compact-button" type="button">Reset</button>
                </div>
              </div>
              <div class="rotation-control">
                <span class="rotation-axis">X</span>
                <input id="rotateX" type="range" min="-180" max="180" step="0.1" value="0" aria-label="X rotation slider" />
                <label class="rotation-number" for="rotateXValue">
                  <input id="rotateXValue" type="number" min="-180" max="180" step="0.1" value="0" aria-label="X rotation degrees" />
                  <span>deg</span>
                </label>
              </div>
              <div class="rotation-control">
                <span class="rotation-axis">Y</span>
                <input id="rotateY" type="range" min="-180" max="180" step="0.1" value="0" aria-label="Y rotation slider" />
                <label class="rotation-number" for="rotateYValue">
                  <input id="rotateYValue" type="number" min="-180" max="180" step="0.1" value="0" aria-label="Y rotation degrees" />
                  <span>deg</span>
                </label>
              </div>
              <div class="rotation-control">
                <span class="rotation-axis">Z</span>
                <input id="rotateZ" type="range" min="-180" max="180" step="0.1" value="0" aria-label="Z rotation slider" />
                <label class="rotation-number" for="rotateZValue">
                  <input id="rotateZValue" type="number" min="-180" max="180" step="0.1" value="0" aria-label="Z rotation degrees" />
                  <span>deg</span>
                </label>
              </div>
              <label class="toggle orbit-toggle">
                <input id="invertOrbit" type="checkbox" />
                <span>Invert orbit drag</span>
              </label>
            </div>
          </section>

          <section class="panel">
            <h2>Flow</h2>
            <label>
              <span>Speed</span>
              <input id="speedMph" type="number" min="1" max="230" step="1" value="70" />
            </label>
            <label>
              <span>Axis</span>
              <select id="flowAxis">
                <option value="x">X</option>
                <option value="y">Y</option>
                <option value="z">Z</option>
              </select>
            </label>
            <label class="toggle">
              <input id="includeGround" type="checkbox" />
              <span>Ground</span>
            </label>
            <label class="toggle">
              <input id="movingGround" type="checkbox" disabled />
              <span>Moving ground</span>
            </label>
            <label>
              <span>Lowest-point road gap mm</span>
              <input id="groundClearanceMm" type="number" min="0" step="1" value="0" disabled />
            </label>
          </section>

          <section class="panel">
            <h2>Case</h2>
            <label>
              <span>Name</span>
              <input id="caseName" type="text" value="sample-70mph" />
            </label>
            <label>
              <span>Reference area m2</span>
              <input id="referenceArea" type="number" min="0" step="0.001" placeholder="Auto" />
            </label>
            <label>
              <span>Reference length m</span>
              <input id="referenceLength" type="number" min="0" step="0.001" placeholder="Auto" />
            </label>
            <label>
              <span>CFD quality</span>
              <select id="qualityPreset">
                <option value="draft">Draft</option>
                <option value="standard" selected>Standard</option>
                <option value="fine">Fine</option>
              </select>
            </label>
            <label>
              <span>Simulation</span>
              <select id="simulationMode">
                <option value="steady" selected>Steady RANS</option>
                <option value="transient">Transient + averaged</option>
              </select>
            </label>
            <label>
              <span>Smallest aero feature mm</span>
              <input id="smallestFeatureMm" type="number" min="0" step="1" placeholder="Optional" />
            </label>
            <button id="createCaseButton" type="button" disabled>Create OpenFOAM Case</button>
            <button id="createStudyButton" type="button" disabled>Create Accuracy Study</button>
            <div class="case-tools">
              <button id="checkSolverButton" type="button">Check Solver</button>
              <button id="meshCaseButton" type="button" disabled>Validate Mesh</button>
              <button id="runCaseButton" type="button" disabled>Run Solver</button>
            </div>
            <div id="runProgress" class="run-progress" hidden aria-live="polite">
              <div class="run-progress-heading">
                <span id="runProgressLabel">Ready to run</span>
                <strong id="runProgressPercent">0%</strong>
              </div>
              <progress id="runProgressBar" max="100" value="0">0%</progress>
              <small id="runProgressDetail"></small>
            </div>
            <p id="solverStatus" class="inline-status"></p>
            <p id="resultSummary" class="inline-status"></p>
          </section>
        </aside>

        <section class="main-stage">
          <div class="stage-header">
            <div>
              <h2 id="modelName">No model loaded</h2>
              <p id="modelStatus">Awaiting STL</p>
            </div>
            <span id="candidateBadge" class="badge muted">Idle</span>
          </div>

          <div class="analysis-grid">
            <section class="visual-panel">
              <div class="viewer-stack">
                <canvas id="flowCanvas" width="900" height="420"></canvas>
                <canvas id="modelCanvas" width="900" height="420" aria-label="Exact STL model view"></canvas>
                <aside id="dragSummary" class="drag-summary" hidden aria-live="polite"></aside>
                <div class="viewer-controls">
                  <div class="viewer-segmented" role="group" aria-label="Surface coloring">
                    <button id="surfaceModeButton" class="active" type="button" aria-pressed="true">Surface</button>
                    <button id="pressureModeButton" type="button" aria-pressed="false" disabled>Cp</button>
                    <button id="dragModeButton" type="button" aria-pressed="false" disabled>Drag areas</button>
                  </div>
                  <label class="viewer-toggle">
                    <input id="showEdges" type="checkbox" />
                    <span>Edges</span>
                  </label>
                </div>
              </div>
            </section>

            <section class="metrics-panel">
              <h3>Geometry</h3>
              <dl id="metrics"></dl>
            </section>
          </div>

          <section class="readiness-panel">
            <h3>CFD Readiness</h3>
            <div id="readiness"></div>
          </section>

          <section class="warnings-panel">
            <h3>Mesh Notes</h3>
            <ul id="warnings"></ul>
          </section>

          <section class="case-panel">
            <div class="case-header">
              <h3>Recent Cases</h3>
              <span id="caseStatus"></span>
            </div>
            <div id="caseList" class="case-list"></div>
          </section>
        </section>
      </main>
    </div>

    <script type="module" src="/assets/app.js?v=56"></script>
  </body>
</html>
